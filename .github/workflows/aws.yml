name: Deploy to ec2
on:
  push:
    branches:
        - main
jobs:
  deploy:
        runs-on: ubuntu-latest
        steps: 
            - name: checkout code
              uses: actions/checkout@v4

            - name: Deploy to ec2
              uses: appleboy/ssh-action@v1.0.3
              with: 
                 host: ${{secrets.EC2HOST}}
                 username: ${{secrets.USERNAME}}
                 key: ${{secrets.KEY}}

                 script: |
                    
                    
                    cd ${{secrets.PATH}}
                    git pull origin main
        
                    
                    cd ~/Netnova-tech-solution/backend
                    pm2 restart server.js || pm2 start server.js
        
                    # 4. Re-install & Re-build Frontend
                    cd ~/Netnova-tech-solution/netnova      # Forces past the Vite version conflict
                    npm run build
                      

