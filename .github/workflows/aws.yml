name: Deploy to ec2
on:
  push:
    branches:
        - main
jobs:
  deploy:
        runs-on: ubuntu-latest
        steps: 
            - name: checkout code
              uses: actions/checkout@v4

            - name: Deploy to ec2
              uses: appleboy/ssh-action@v1.0.3
              with: 
                 host: ${{secrets.EC2HOST}}
                 username: ${{secrets.USERNAME}}
                 key: ${{secrets.KEY}}

                 script: |
                    # 1. Load Node 22 environment into this SSH session
                    export NVM_DIR="$HOME/.nvm"
                    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        
                    # 2. Update Code
                    cd ~/Netnova-tech-solution
                    git reset --hard HEAD
                    git pull origin main
        
                    # 3. Re-install & Re-start Backend
                    cd ~/Netnova-tech-solution/backend
                    rm -rf node_modules package-lock.json # Wipes the old Node 18 build
                    npm install --production
                    pm2 restart server.js || pm2 start server.js
        
                    # 4. Re-install & Re-build Frontend
                    cd ~/Netnova-tech-solution/netnova
                    rm -rf node_modules package-lock.json # Wipes the conflicting build
                    npm install --legacy-peer-deps        # Forces past the Vite version conflict
                    npm run build
                      

